/* ──────────────── COMMISSION ENGINE ──────────────────────────────────────────
   Strategy: Commission is globally configurable. During launch, it's 0%.
   calculateCommission() returns 0 during launch mode.
   This architecture lets us flip a single toggle to start collecting commission.
   Future: Replace PLATFORM_CONFIG with a Firebase remote config call.
────────────────────────────────────────────────────────────────────────────── */
const PLATFORM_CONFIG_DEFAULTS = {
  launchMode: true,           // true = 0% commission active
  commissionRate: 0,          // current rate applied (0 during launch)
  postLaunchRate: 8,          // default future rate shown in UI
  launchMessage: "🎉 Launch Offer: 0% Commission – Limited Period",
  platformName: "Lunchly Pro",
};

// Pure commission calculation — swap launchMode=false and update rate to go live
const calculateCommission = (amount, config) => {
  if (config.launchMode) return 0;
  return Math.round(amount * (config.commissionRate / 100));
};

  return (
    <div style={{display:"flex",gap:"6px",alignItems:"flex-end",height:`${height}px`}}>
      {data.map((r,i)=>(
        <div key={r.m||r.d||i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"4px"}}>
          {r.v > 0 && <div style={{fontSize:"8px",color:"var(--text-muted)",fontWeight:"600"}}>{r.label||""}</div>}

        </div>

    </div>

/* ──────────────── OTP LOGIN ──────────────── */
const OTPLogin = ({onLogin, onBack, role}) => {
  const [step, setStep] = useState("phone");
  const [phone, setPhone] = useState("");
  const [otp, setOtp] = useState(["","","","",""]);
  const [name, setName] = useState("");
  const [loading, setLoading] = useState(false);
  const [timer, setTimer] = useState(0);
  const [errorMsg, setErrorMsg] = useState("");
  const otpRefs = [useRef(),useRef(),useRef(),useRef(),useRef()];

  useEffect(()=>{ if(timer>0){const t=setTimeout(()=>setTimer(timer-1),1000);return()=>clearTimeout(t);} },[timer]);

  /* ── Send OTP via Firebase Phone Auth ──────────────────────── */
  const sendOTP = async () => {
    if (phone.length < 10) return;
    setErrorMsg(""); setLoading(true);
    console.log("[Lunchly] Sending OTP to +91" + phone);
    try {
      if (window.lunchlyFirebase) {
        await window.lunchlyFirebase.sendOTP("+91" + phone);
        console.log("[Lunchly] OTP dispatched via Firebase");
      } else {
        console.warn("[Lunchly] Firebase not ready — using mock flow");
        await new Promise(r => setTimeout(r, 1400));
      }
      setLoading(false); setStep("otp"); setTimer(30);
    } catch (err) {
      setLoading(false);
      console.error("[Lunchly] sendOTP error:", err);
      setErrorMsg(err.message || "Failed to send OTP. Please try again.");
    }
  };

  const handleOtpChange = (i, val) => {
    const n=[...otp]; n[i]=val.slice(-1); setOtp(n);
    if(val&&i<4) otpRefs[i+1].current?.focus();
  };

  /* ── Verify OTP via Firebase ────────────────────────────────── */
  const verifyOTP = async () => {
    setErrorMsg(""); setLoading(true);
    console.log("[Lunchly] Verifying OTP:", otp.join(""));
    try {
      if (window.lunchlyFirebase) {
        await window.lunchlyFirebase.verifyOTP(otp.join(""));
        console.log("[Lunchly] OTP verified — moving to profile step");
      } else {
        await new Promise(r => setTimeout(r, 1400));
      }
      setLoading(false); setStep("profile");
    } catch (err) {
      setLoading(false);
      console.error("[Lunchly] verifyOTP error:", err);
      setErrorMsg("Invalid OTP. Please check and try again.");
    }
  };

  /* ── Save user to Firestore & complete login ────────────────── */
  const completeProfile = async () => {
    if (!name.trim()) return;
    setErrorMsg(""); setLoading(true);
    console.log("[Lunchly] Saving user profile:", name, phone);
    try {
      let uid = "local_" + Date.now();
      if (window.lunchlyFirebase) {
        const saved = await window.lunchlyFirebase.saveUser(phone, name);
        uid = saved.uid;
        console.log("[Lunchly] User saved to Firestore, uid:", uid);
      } else {
        await new Promise(r => setTimeout(r, 1000));
      }
      setLoading(false);
      onLogin({ name, phone, uid });
    } catch (err) {
      setLoading(false);
      console.error("[Lunchly] saveUser error:", err);
      setErrorMsg("Could not save profile. Please try again.");
    }
  };
  const inp = {width:"100%",padding:"14px 16px",borderRadius:"14px",border:`2px solid var(--input-border)`,fontSize:"15px",outline:"none",marginBottom:"12px",background:"var(--input-bg)",color:"var(--text)",fontFamily:"var(--font-body)"};
  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:"844px"}}>
      <div style={{background:`linear-gradient(160deg,var(--green-xdark),#0d3320)`,padding:"60px 28px 44px",textAlign:"center",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-40,right:-40,width:150,height:150,borderRadius:"50%",background:"var(--green-glow)"}}/>
        <button onClick={onBack} style={{position:"absolute",top:"48px",left:"20px",background:"rgba(255,255,255,0.15)",border:"none",borderRadius:"12px",width:"38px",height:"38px",color:"#fff",fontSize:"16px",cursor:"pointer"}}>←</button>
        <div style={{fontSize:"56px",animation:"pop 0.6s ease-out both",position:"relative"}}>{role==="provider"?"👨‍🍳":"🎓"}</div>
        <div style={{fontWeight:"900",fontSize:"24px",color:"#fff",marginTop:"14px",position:"relative",fontFamily:"var(--font)"}}>{step==="phone"?"Enter Phone":step==="otp"?"Verify OTP":"Your Profile"}</div>
        <div style={{color:"var(--green-mid)",fontSize:"13px",marginTop:"6px",position:"relative"}}>{step==="phone"?"We'll send you a 5-digit OTP":step==="otp"?`OTP sent to +91 ${phone}`:"Almost there!"}</div>
      </div>
      <div style={{flex:1,padding:"28px 24px",background:"var(--off-white)"}}>
        {errorMsg&&<div style={{background:"#fee2e2",border:"1.5px solid #fca5a5",borderRadius:"12px",padding:"10px 14px",marginBottom:"14px",fontSize:"13px",color:"#dc2626",fontWeight:"600",display:"flex",alignItems:"center",gap:"8px"}}>⚠️ {errorMsg}</div>}
        {step==="phone"&&<><div style={{fontWeight:"700",fontSize:"14px",color:"var(--text)",marginBottom:"8px"}}>Mobile Number</div>
          <div style={{display:"flex",gap:"8px",marginBottom:"16px"}}>
            <div style={{padding:"14px",background:"var(--card-bg)",border:`2px solid var(--input-border)`,borderRadius:"14px",fontWeight:"700",fontSize:"15px",color:"var(--text-muted)"}}>+91</div>
            <input value={phone} onChange={e=>setPhone(e.target.value.replace(/\D/g,"").slice(0,10))} placeholder="Enter 10-digit number" type="tel" style={{...inp,marginBottom:0,flex:1}}/>
          </div>
          <Btn onClick={sendOTP} loading={loading} disabled={phone.length<10}>Send OTP →</Btn>
        </>}
        {step==="otp"&&<><div style={{fontWeight:"700",fontSize:"14px",color:"var(--text)",marginBottom:"16px",textAlign:"center"}}>Enter 5-digit OTP</div>
          <div style={{display:"flex",gap:"8px",justifyContent:"center",marginBottom:"20px"}}>
            {otp.map((v,i)=>(
              <input key={i} ref={otpRefs[i]} value={v} onChange={e=>handleOtpChange(i,e.target.value)} type="tel" maxLength={1}
                style={{width:"52px",height:"56px",textAlign:"center",fontSize:"22px",fontWeight:"800",borderRadius:"14px",border:`2px solid ${v?"var(--green)":"var(--input-border)"}`,outline:"none",background:"var(--input-bg)",color:"var(--text)",transition:"border 0.2s"}}/>
            ))}
          </div>
          <Btn onClick={verifyOTP} loading={loading} disabled={otp.join("").length<5}>Verify OTP →</Btn>
          <div style={{textAlign:"center",marginTop:"16px",fontSize:"13px",color:"var(--text-muted)"}}>
            {timer>0?`Resend in ${timer}s`:<span style={{color:"var(--green-dark)",cursor:"pointer",fontWeight:"700"}} onClick={()=>{setTimer(30);setOtp(["","","","",""]);setStep("phone");}}>Resend OTP</span>}
          </div>
        </>}
        {step==="profile"&&<><div style={{fontWeight:"700",fontSize:"14px",color:"var(--text)",marginBottom:"8px"}}>Your Name</div>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Enter your full name" style={inp}/>
          <Btn onClick={completeProfile} loading={loading} disabled={!name.trim()}>Let's Go 🚀</Btn>
        </>}
      </div>
    </div>
  );
};

            {topTiffins.map((t,i)=>(
              <div key={t.name} style={{display:"flex",alignItems:"center",gap:"12px",padding:"10px 0",borderBottom:i<3?`1px solid var(--border)`:"none"}}>
                <div style={{width:"28px",height:"28px",borderRadius:"8px",background:i===0?"#fef3c7":i===1?"#f1f5f9":"#fff7ed",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",flexShrink:0}}>{i===0?"🥇":i===1?"🥈":"🥉"}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:"700",fontSize:"13px",color:"var(--text)"}}>{t.name}</div>
                  <div style={{fontSize:"11px",color:"var(--text-muted)"}}>{t.orders} orders · ⭐ {t.rating} · {t.area}</div>
                </div>
                <div style={{fontWeight:"800",fontSize:"14px",color:"var(--green-dark)",fontFamily:"var(--font)"}}>{t.revenue}</div>
              </div>
            ))}
          </Card>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"14px"}}>
            {[{label:"Avg Order Value",value:"₹218",icon:"📊",color:"var(--blue)"},{label:"Retention Rate",value:"82.9%",icon:"🔄",color:"var(--green)"},{label:"Daily Active",value:"142",icon:"👥",color:"var(--orange)"},{label:"Avg Rating",value:"4.7 ★",icon:"⭐",color:"var(--yellow)"}].map(s=>(
              <StatCard key={s.label} icon={s.icon} value={s.value} label={s.label} color={s.color}/>
            ))}
          </div>
          <Card>
            <div style={{fontWeight:"800",fontSize:"14px",color:"var(--text)",marginBottom:"12px",fontFamily:"var(--font)"}}>📅 Orders by Day</div>
            <MiniBarChart data={[{m:"Mon",v:85},{m:"Tue",v:92},{m:"Wed",v:78},{m:"Thu",v:95},{m:"Fri",v:88},{m:"Sat",v:70},{m:"Sun",v:60}]} height={80}/>
          </Card>
        </div>}
      </div>
    </div>
  );
};

/* ──────────────── MAIN APP ──────────────── */
function App() {
  const [screen, setScreen] = useState("splash");
  const [darkMode, setDarkMode] = useState(false);
  const [area, setArea] = useState(null);
  const [tiffin, setTiffin] = useState(null);
  const [plan, setPlan] = useState(null);
  const [amount, setAmount] = useState(null);
  const [mealTime, setMealTime] = useState("lunch");
  const [user, setUser] = useState(null);
  const [loginRole, setLoginRole] = useState(null);
  const [customTiffins, setCustomTiffins] = useState([]);
  const [providerRegData, setProviderRegData] = useState(null);
  const [notifications, setNotifications] = useState(INITIAL_NOTIFICATIONS);
  const [orders, setOrders] = useState(SAMPLE_ORDERS);
  const [savedAddresses, setSavedAddresses] = useState([
    {flat:"Room 204", building:"Yashwant Hostel", landmark:"Near Main Gate", pincode:"422005", label:"Home"}
  ]);
  const [currentAddress, setCurrentAddress] = useState(null);
  const [walletBalance, setWalletBalance] = useState(150);
  const [prevScreen, setPrevScreen] = useState(null);

  // ── PLATFORM CONFIG STATE ──────────────────────────────────────────────────
  // Central source of truth for commission logic.
  // All panels (provider, admin) read from this shared config.
  // In production: replace this with a Firebase remote config or API call.
  const [platformConfig, setPlatformConfig] = useState(PLATFORM_CONFIG_DEFAULTS);

  const go = (s) => { setPrevScreen(screen); setScreen(s); };

  useEffect(() => {
    if (darkMode) document.documentElement.classList.add("dark-mode");
    else document.documentElement.classList.remove("dark-mode");
  }, [darkMode]);

  const handleCustomer = () => {
    if (user) go("location");
    else { setLoginRole("customer"); go("otp-login"); }
  };

  const handleLogin = (userData) => {
    setUser(userData);
    if (loginRole==="customer") go("location");
  };

  const addOrder = (newOrder) => setOrders(prev => [newOrder, ...prev]);
  const markNotificationsRead = () => setNotifications(prev => prev.map(n=>({...n,read:true})));
  const cancelOrder = (id) => setOrders(prev => prev.filter(o => o.id !== id));

  const handleProviderRegistration = (formData) => {
    const newTiffin = {
      id: Date.now(),
      name: formData.messName,
      price: parseInt(formData.monthlyPrice)||1500,
      type: formData.foodType==="both"?"veg":formData.foodType,
      rating: 0, reviews: 0,
      area: formData.area,
      emoji: formData.emoji||"🥘",
      tag: formData.tag||"New",
      tagColor: TAG_COLORS[formData.tag]||"#3b82f6",
      cook: formData.ownerName,
      since: new Date().getFullYear().toString(),
      deliveryTime: formData.deliverySlot==="lunch"?"12:00–1:30 PM":formData.deliverySlot==="dinner"?"7:00–9:00 PM":"12:00–1:30 PM & 7:00–9:00 PM",
      menu: {mon:"Coming soon",tue:"Coming soon",wed:"Coming soon",thu:"Coming soon",fri:"Coming soon",sat:"Coming soon",sun:"Coming soon"},
      description: `Fresh homemade tiffins by ${formData.ownerName} in ${formData.area}. Up to ${formData.maxCapacity} slots/day.`,
      reviewsList: [],
      featured: false,
      monthlyOrders: 0,
      monthlyRevenue: 0,
    };
    setCustomTiffins(prev => [newTiffin, ...prev]);
    setProviderRegData(formData);
    go("provider-dashboard");
  };

  const handlePaymentSuccess = () => {
    const newOrder = {
      id: "LCH"+Math.floor(Math.random()*90000+10000),
      tiffin: tiffin.name, emoji: tiffin.emoji,
      plan: plan==="today"?"Today":plan==="daily"?"Daily":"Monthly",
      status: plan==="today"?"out_for_delivery":"preparing",
      amount: amount, date: "Today",
      statusLabel: plan==="today"?"Out for Delivery":"Preparing"
    };
    addOrder(newOrder);
    setNotifications(prev=>[{id:Date.now(),icon:"✅",title:"Order Confirmed!",msg:`Your order from ${tiffin.name} is confirmed!`,time:"Just now",read:false},...prev]);
    go("confirm");
  };

  const handleAddressSave = (addr) => {
    if (!savedAddresses.find(a=>a.flat===addr.flat&&a.building===addr.building)) {
      setSavedAddresses(prev=>[...prev,addr]);
    }
    setCurrentAddress(addr);
    go("payment");
  };

  const showBottomNav = user && ["listing","my-orders","profile","notifications"].includes(screen);
  const BOTTOM_NAV = [
    {id:"listing",icon:"🏠",label:"Home"},
    {id:"my-orders",icon:"📦",label:"Orders"},
    {id:"notifications",icon:"🔔",label:"Alerts", badge:notifications.filter(n=>!n.read).length},
    {id:"profile",icon:"👤",label:"Profile"},
  ];

  return (
    <PhoneFrame>
      <div style={{position:"fixed",top:"32px",right:"32px",zIndex:100}}>
        <DarkToggle dark={darkMode} onToggle={()=>setDarkMode(!darkMode)}/>
      </div>

      {screen==="splash"&&<SplashScreen onDone={()=>go("role")}/>}
      {screen==="role"&&<RoleScreen onCustomer={handleCustomer} onProvider={()=>go("provider-login")} onAdmin={()=>go("admin")}/>}
      {screen==="otp-login"&&<OTPLogin onLogin={handleLogin} onBack={()=>go("role")} role={loginRole}/>}
      {screen==="location"&&<LocationScreen onSelect={a=>{setArea(a);go("listing");}} onBack={()=>go("role")}/>}
      {screen==="listing"&&<ListingScreen area={area} onSelect={t=>{setTiffin(t);go("detail");}} onBack={()=>go("location")} user={user} notifications={notifications} onNotifications={()=>go("notifications")} extraTiffins={customTiffins} platformConfig={platformConfig}/>}
      {screen==="detail"&&tiffin&&<DetailScreen tiffin={tiffin} onSubscribe={(p,a,mt)=>{setPlan(p);setAmount(a);setMealTime(mt||"lunch");go("address");}} onBack={()=>go("listing")}/>}
      {screen==="address"&&<AddressScreen onSave={handleAddressSave} onBack={()=>go("detail")} savedAddresses={savedAddresses} onSelectSaved={addr=>{setCurrentAddress(addr);go("payment");}}/>}
      {screen==="payment"&&tiffin&&<PaymentScreen tiffin={tiffin} plan={plan} amount={amount} mealTime={mealTime} address={currentAddress} onSuccess={handlePaymentSuccess} onBack={()=>go("address")} walletBalance={walletBalance}/>}
      {screen==="confirm"&&tiffin&&<ConfirmScreen tiffin={tiffin} plan={plan} amount={amount} mealTime={mealTime} address={currentAddress} onHome={()=>go("listing")} onMyOrders={()=>go("my-orders")}/>}
      {screen==="my-orders"&&<MyOrders orders={orders} onBack={()=>go("listing")} onCancelOrder={cancelOrder}/>}
      {screen==="notifications"&&<NotificationsScreen notifications={notifications} onBack={()=>go("listing")} onMarkRead={markNotificationsRead}/>}
      {screen==="profile"&&<UserProfile user={user} orders={orders} savedAddresses={savedAddresses} walletBalance={walletBalance} notifications={notifications} onBack={()=>go("listing")} onLogout={()=>{ if(window.lunchlyFirebase) window.lunchlyFirebase.logout(); setUser(null); go("role"); }}/>}
      {screen==="provider-login"&&<ProviderLogin onLogin={()=>go("provider-dashboard")} onBack={()=>go("role")} onRegister={()=>go("provider-register")}/>}
      {screen==="provider-register"&&<ProviderRegister onBack={()=>go("provider-login")} onSuccess={handleProviderRegistration}/>}
      {screen==="provider-dashboard"&&<ProviderDashboard onBack={()=>go("role")} providerData={providerRegData} platformConfig={platformConfig}/>}
      {screen==="admin"&&<AdminPanel onBack={()=>go("role")} platformConfig={platformConfig} onUpdateConfig={(cfg)=>setPlatformConfig(cfg)}/>}

      {showBottomNav&&(
        <div style={{display:"flex",borderTop:`1px solid var(--border)`,background:"var(--card-bg)",padding:"10px 0 18px"}}>
          {BOTTOM_NAV.map(item=>(
            <button key={item.id} onClick={()=>go(item.id)} style={{flex:1,border:"none",background:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:"3px",cursor:"pointer",position:"relative"}}>
              <span style={{fontSize:"20px",filter:screen===item.id?"none":"grayscale(0.5)"}}>{item.icon}</span>
              <span style={{fontSize:"10px",fontWeight:screen===item.id?"700":"500",color:screen===item.id?"var(--green-dark)":"var(--text-muted)"}}>{item.label}</span>
              {item.badge>0&&<span style={{position:"absolute",top:"-2px",right:"calc(50% - 20px)",background:"#ef4444",color:"#fff",borderRadius:"50%",width:"16px",height:"16px",fontSize:"9px",fontWeight:"800",display:"flex",alignItems:"center",justifyContent:"center"}}>{item.badge}</span>}
              {screen===item.id&&<div style={{width:"24px",height:"3px",borderRadius:"2px",background:"var(--green)",marginTop:"2px"}}/>}
            </button>
          ))}
        </div>
      )}
    </PhoneFrame>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script type="module">
  import { initializeApp }     from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import {
    getAuth, RecaptchaVerifier,
    signInWithPhoneNumber, signOut
  }                            from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
  import {
    getFirestore, doc,
    setDoc, serverTimestamp
  }                            from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

  /* ──────────────────────────────────────────────────────────────────────
     🔧 REPLACE WITH YOUR FIREBASE CONFIG
        Firebase Console > Project Settings > Your Apps > SDK setup & config
  ──────────────────────────────────────────────────────────────────────── */
  const firebaseConfig = {
    apiKey:            "YOUR_API_KEY",
    authDomain:        "YOUR_PROJECT_ID.firebaseapp.com",
    projectId:         "YOUR_PROJECT_ID",
    storageBucket:     "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId:             "YOUR_APP_ID"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);
  console.log("[Lunchly Firebase] Initialized app, auth, firestore");

  /* ── reCAPTCHA verifier factory ──────────────────────────────────────── */
  function createRecaptcha() {
    if (window._lunchlyRecaptcha) {
      try { window._lunchlyRecaptcha.clear(); } catch (_) {}
      window._lunchlyRecaptcha = null;
    }
    const v = new RecaptchaVerifier(auth, "recaptcha-container", {
      size: "invisible",
      callback:           () => console.log("[Lunchly Firebase] reCAPTCHA solved"),
      "expired-callback": () => console.warn("[Lunchly Firebase] reCAPTCHA expired")
    });
    window._lunchlyRecaptcha = v;
    return v;
  }

  /* ── Public API — called by OTPLogin React component ────────────────── */
  window.lunchlyFirebase = {

    // 1. Send OTP
    sendOTP: async (phoneNumber) => {
      console.log("[Lunchly Firebase] sendOTP:", phoneNumber);
      const verifier = createRecaptcha();
      try {
        const result = await signInWithPhoneNumber(auth, phoneNumber, verifier);
        window.lunchlyFirebase._confirmationResult = result;
        console.log("[Lunchly Firebase] OTP sent successfully");
        return result;
      } catch (err) {
        console.error("[Lunchly Firebase] sendOTP error:", err.code, err.message);
        try { verifier.clear(); } catch (_) {}
        window._lunchlyRecaptcha = null;
        throw err;
      }
    },

    // 2. Verify OTP
    verifyOTP: async (code) => {
      const cr = window.lunchlyFirebase._confirmationResult;
      if (!cr) throw new Error("No OTP session — please request a new code.");
      console.log("[Lunchly Firebase] verifyOTP: confirming code");
      const cred = await cr.confirm(code);
      console.log("[Lunchly Firebase] OTP verified, uid:", cred.user.uid);
      return cred;
    },

    // 3. Save user to Firestore "users" collection
    saveUser: async (phone, name) => {
      const u = auth.currentUser;
      if (!u) throw new Error("No authenticated user — verify OTP first.");
      console.log("[Lunchly Firebase] saveUser, uid:", u.uid);
      await setDoc(
        doc(db, "users", u.uid),
        { uid: u.uid, phone, name, role: "user", createdAt: serverTimestamp() },
        { merge: true }
      );
      console.log("[Lunchly Firebase] User written to Firestore");
      return { uid: u.uid };
    },

    // 4. Logout
    logout: async () => {
      try {
        await signOut(auth);
        console.log("[Lunchly Firebase] Signed out");
      } catch (err) {
        console.error("[Lunchly Firebase] Logout error:", err.code);
      }
    },

    _confirmationResult: null
  };

  console.log("[Lunchly Firebase] window.lunchlyFirebase API ready");
</script>
